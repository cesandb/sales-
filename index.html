<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Phorm CRM" />
    <link rel="apple-touch-icon" href="./icon.svg" />
    <link rel="manifest" href="./manifest.json" />
    <title>Phorm CRM – Conan's Sales Hub</title>
    <!-- SPA routing restore: decodes the redirect from 404.html on GitHub Pages -->
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var q = params.get('q') ? '?' + params.get('q').replace(/~and~/g, '&') : '';
          window.history.replaceState(
            null, null,
            window.location.pathname + p.replace(/~and~/g, '&') + q + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
