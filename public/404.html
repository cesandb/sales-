<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>1st Phorm Sales CRM – Conan</title>
    <script>
      // SPA redirect for GitHub Pages.
      // Encodes the full path as a query param so index.html can restore it.
      // pathSegmentsToKeep = 1 keeps the /sales-/ project prefix.
      (function () {
        var l = window.location;
        var segs = 1; // number of path segments to keep (repo name = 1)
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
          l.pathname.split('/').slice(0, 1 + segs).join('/') + '/?p=/' +
          l.pathname.slice(1).split('/').slice(segs).join('/').replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
